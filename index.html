<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翔毅車業預定系統 v4.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --main: #5865F2; --bg: #121212; --card: #1e1e1e; --accent: #ff9900; --text: #eeeeee; --row-bg: #2a2a2a; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); text-align: center; letter-spacing: 2px; margin-top: 0; }
        
        .dc-btn { background: #5865F2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; transition: 0.3s; }
        .user-box { background: #2f3136; padding: 10px; border-radius: 8px; display: none; align-items: center; gap: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .user-box img { border-radius: 50%; width: 35px; }

        label { display: block; margin-top: 15px; color: #aaa; font-size: 13px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; background: #2a2a2a; color: white; outline: none; }
        .btn-send { background: var(--accent); color: black; font-weight: bold; border: none; font-size: 16px; margin-top: 20px; cursor: pointer; }

        .checkbox-group { background: #2a2a2a; border-radius: 8px; padding: 5px; max-height: 350px; overflow-y: auto; border: 1px solid #444; margin-top: 8px; }
        .item-option { display: flex; flex-direction: column; padding: 12px; border-bottom: 1px solid #333; }
        .item-main { display: flex; align-items: center; cursor: pointer; }
        .item-main input[type="checkbox"] { width: auto; margin-right: 12px; }
        .price-tag { color: var(--accent); font-size: 12px; margin-left: auto; font-weight: bold; }
        
        /* 零售數量控制區 */
        .qty-control { display: none; align-items: center; gap: 10px; margin-top: 10px; padding: 8px; background: #1a1a1a; border-radius: 6px; }
        .qty-btn { width: 30px; height: 30px; padding: 0; background: #444; border: none; color: white; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .qty-val { font-weight: bold; color: var(--accent); min-width: 20px; text-align: center; }

        .custom-price-input { margin-top: 10px; padding: 10px; background: #1a1a1a; border-left: 3px solid var(--accent); display: none; }
        
        .calc-hint { color: #fff; font-size: 13px; margin-top: 15px; background: rgba(255,153,0,0.08); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,153,0,0.2); line-height: 1.8; display: none; }
        .calc-hint b { color: var(--accent); font-size: 20px; }

        /* 管理者樣式優化 */
        .admin-section { display: none; border-top: 2px dashed #444; margin-top: 30px; padding-top: 20px; }
        .cat-card { background: #1a1a1a; border: 1px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px 12px; border-radius: 8px; margin-top: 8px; font-size: 13px; border: 1px solid #444; cursor: default; }
        .item-row.sortable-ghost { opacity: 0.4; background: var(--main); }
        .drag-handle { cursor: grab; color: #666; margin-right: 10px; font-size: 18px; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        
        .item-info { flex: 1; display: flex; align-items: center; }
        .admin-btns { display: flex; gap: 8px; }
        .del-btn { width: auto; background: #e74c3c; padding: 6px 12px; font-size: 11px; cursor: pointer; border: none; margin: 0; color: white; }
        .edit-btn { width: auto; background: #3498db; padding: 6px 12px; font-size: 11px; cursor: pointer; border: none; margin: 0; color: white; }
        .webhook-btn { width: auto; background: #9b59b6; padding: 4px 8px; font-size: 10px; cursor: pointer; border: none; margin: 0; color: white; border-radius: 4px; }
        
        .mode-toggle { display: flex; gap: 4px; margin-bottom: 10px; }
        .mode-toggle button { flex: 1; font-size: 11px; padding: 6px; background: #444; border: none; cursor: pointer; }
        .mode-toggle button.active { background: var(--accent); color: black; }

        /* 自定義彈窗 */
        #custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2a2a2a; padding: 20px; border-radius: 10px; border: 2px solid var(--accent); z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.8); width: 80%; max-width: 300px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    </style>
</head>
<body>

<div class="modal-overlay" id="modal-overlay"></div>
<div id="custom-modal">
    <h4 id="modal-title" style="margin-top:0">修改資訊</h4>
    <p id="modal-item-name" style="font-size:12px; color:#aaa;"></p>
    <div id="modal-input-area"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="modal-confirm" style="background:var(--accent); color:black; margin:0">儲存</button>
        <button onclick="closeModal()" style="background:#555; margin:0">取消</button>
    </div>
</div>

<div class="card">
    <h2>🏎️ 翔毅車業預定系統</h2>

    <div id="player-view">
        <button id="login-btn" class="dc-btn" onclick="loginDiscord()">連結 Discord 帳號驗證</button>
        <div id="user-display" class="user-box">
            <img id="user-avatar" src="" alt="">
            <div style="display:flex; flex-direction:column;">
                <span id="user-name" style="font-weight:bold;"></span>
                <span id="user-id-display" style="font-size:10px; color:#888;"></span>
            </div>
        </div>

        <label>1. 選擇業務類別</label>
        <select id="pCat" onchange="updateItems()"><option value="">讀取中...</option></select>
        
        <label>2. 勾選服務項目 (多選)</label>
        <div id="item-list" class="checkbox-group">
            <p style="color:#666; font-size:12px; text-align:center; padding:10px;">請先選擇類別</p>
        </div>
        
        <div id="calc-section" style="display:none;">
            <div id="total-calc-hint" class="calc-hint"></div>
            <label>3. 最終預定總金額</label>
            <input type="number" id="pPrice" placeholder="系統試算結果">
        </div>
        
        <button class="btn-send" id="submit-btn" onclick="sendOrder()">送出預定</button>
        <p style="font-size: 10px; color: #444; text-align: center; cursor: pointer; margin-top:40px;" onclick="showLogin()">⚙️ 翔毅員工管理中心</p>
    </div>

    <div id="login-view" style="display:none;">
        <h3>員工登入</h3>
        <input type="text" id="aUser" placeholder="帳號">
        <input type="password" id="aPass" placeholder="密碼">
        <button onclick="authAdmin()">登入</button>
        <button style="background:#444;" onclick="location.reload()">返回</button>
    </div>

    <div id="admin-view" class="admin-section">
        <div class="cat-card">
            <h4>1. 分類管理</h4>
            <input type="text" id="nCatName" placeholder="分類名稱">
            <input type="text" id="nCatWeb" placeholder="Webhook 網址">
            <button onclick="addCat()">新增分類</button>
        </div>
        <div class="cat-card">
            <h4>2. 項目管理</h4>
            <select id="aCatSelect"></select>
            <input type="text" id="nItemName" placeholder="項目名稱">
            <div class="mode-toggle">
                <button id="modeSingle" class="active" onclick="setPriceMode('single')">固定價</button>
                <button id="modeRetail" onclick="setPriceMode('retail')">零售(量)</button>
                <button id="modeRange" onclick="setPriceMode('range')">範圍</button>
                <button id="modeCustom" onclick="setPriceMode('custom')">自填(10%)</button>
            </div>
            <div id="inputSingle"><input type="number" id="nItemPrice" placeholder="售價 (或單價)"></div>
            <div id="inputRange" style="display:none; display:flex; gap:5px;"><input type="number" id="nPriceMin" placeholder="最低">~<input type="number" id="nPriceMax" placeholder="最高"></div>
            <button onclick="addItem()" style="margin-top:10px">確認上架</button>
        </div>
        <div id="admin-list-container"></div>
    </div>
</div>

<script>
    const CLIENT_ID = '1496839420521742367'; 
    const REDIRECT_URI = window.location.href.split('#')[0]; 
    const firebaseConfig = {
        apiKey: "AIzaSyAO56gUfagEELFVpvu7cxKKfmO4Q165QlE",
        authDomain: "fivem-shop-7907b.firebaseapp.com",
        databaseURL: "https://fivem-shop-7907b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fivem-shop-7907b",
        storageBucket: "fivem-shop-7907b.firebasestorage.app",
        messagingSenderId: "640041446455",
        appId: "1:640041446455:web:6914a2d1b3545a6bf5a3b2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let storeData = {}, userData = null, currentMode = 'single';

    function loginDiscord() {
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    }

    window.onload = () => {
        const hash = new URLSearchParams(window.location.hash.slice(1));
        const token = hash.get('access_token');
        if (token) {
            fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } })
            .then(r => r.json()).then(res => {
                userData = res;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').style.display = 'flex';
                document.getElementById('user-name').innerText = res.username;
                document.getElementById('user-id-display').innerText = `ID: ${res.id}`;
            });
        }
        db.ref('xiangyi_shop').on('value', s => { 
            storeData = s.val() || {}; 
            refreshUI(); 
        });
    };

    function refreshUI() {
        const pC = document.getElementById('pCat'), aC = document.getElementById('aCatSelect'), aLC = document.getElementById('admin-list-container');
        pC.innerHTML = '<option value="">請選擇...</option>'; aC.innerHTML = '<option value="">請選擇...</option>';
        aLC.innerHTML = '';

        for (let catId in storeData) {
            const cat = storeData[catId];
            pC.innerHTML += `<option value="${catId}">${cat.name}</option>`;
            aC.innerHTML += `<option value="${catId}">${cat.name}</option>`;
            
            const catDiv = document.createElement('div');
            catDiv.className = 'cat-card';
            catDiv.innerHTML = `
                <div class="cat-header">
                    <div>
                        <b>${cat.name}</b>
                        <br><button class="webhook-btn" onclick="openWebhookModal('${catId}')">修改 Webhook (網址)</button>
                    </div>
                    <button class="del-btn" style="background:#555" onclick="deleteCategory('${catId}')">刪除分類</button>
                </div>
                <div id="list-${catId}" class="sortable-list"></div>
            `;
            aLC.appendChild(catDiv);

            const itemListDiv = catDiv.querySelector('.sortable-list');
            const itemsArray = [];
            for (let iId in cat.items) {
                itemsArray.push({ id: iId, ...cat.items[iId] });
            }
            itemsArray.sort((a, b) => (a.order || 0) - (b.order || 0));

            itemsArray.forEach(it => {
                let priceLabel = '';
                if(it.type === 'single') priceLabel = `$${it.price}`;
                else if(it.type === 'retail') priceLabel = `$${it.price}/個`;
                else if(it.type === 'range') priceLabel = `$${it.min}-${it.max}`;
                else priceLabel = '自填10%';

                const row = document.createElement('div');
                row.className = 'item-row';
                row.dataset.id = it.id;
                row.innerHTML = `
                    <div class="item-info">
                        <span class="drag-handle">⠿</span>
                        <div><b>${it.name}</b> <span style="color:#888">(${priceLabel})</span></div>
                    </div>
                    <div class="admin-btns">
                        <button class="edit-btn" onclick="openEditModal('${catId}', '${it.id}')">改價</button>
                        <button class="del-btn" onclick="deleteItem('${catId}', '${it.id}')">下架</button>
                    </div>
                `;
                itemListDiv.appendChild(row);
            });

            new Sortable(itemListDiv, {
                handle: '.drag-handle',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: () => saveOrder(catId)
            });
        }
    }

    // --- 修改 Webhook 的彈窗控制 ---
    function openWebhookModal(catId) {
        const cat = storeData[catId];
        const modal = document.getElementById('custom-modal');
        const overlay = document.getElementById('modal-overlay');
        const inputArea = document.getElementById('modal-input-area');
        const confirmBtn = document.getElementById('modal-confirm');
        
        document.getElementById('modal-title').innerText = "修改 Webhook 網址";
        document.getElementById('modal-item-name').innerText = `分類：${cat.name}`;
        
        inputArea.innerHTML = `<input type="text" id="edit-webhook" value="${cat.webhook || ''}" placeholder="貼上新的 Discord Webhook 網址">`;
        
        confirmBtn.onclick = () => {
            const newW = document.getElementById('edit-webhook').value;
            if(newW) { 
                db.ref(`xiangyi_shop/${catId}`).update({ webhook: newW }); 
                closeModal(); 
            } else {
                alert("網址不能為空");
            }
        };

        modal.style.display = 'block';
        overlay.style.display = 'block';
    }

    function saveOrder(catId) {
        const list = document.getElementById(`list-${catId}`);
        const rows = list.querySelectorAll('.item-row');
        const updates = {};
        rows.forEach((row, index) => {
            const itemId = row.dataset.id;
            updates[`/xiangyi_shop/${catId}/items/${itemId}/order`] = index;
        });
        db.ref().update(updates);
    }

    function deleteCategory(id) { if(confirm('確定要刪除整個分類嗎？')) db.ref(`xiangyi_shop/${id}`).remove(); }
    function deleteItem(catId, itemId) { db.ref(`xiangyi_shop/${catId}/items/${itemId}`).remove(); }

    function openEditModal(catId, itemId) {
        const item = storeData[catId].items[itemId];
        const modal = document.getElementById('custom-modal');
        const overlay = document.getElementById('modal-overlay');
        const inputArea = document.getElementById('modal-input-area');
        const confirmBtn = document.getElementById('modal-confirm');
        
        document.getElementById('modal-title').innerText = "修改價格";
        document.getElementById('modal-item-name').innerText = item.name;
        inputArea.innerHTML = '';
        
        if (item.type === 'single' || item.type === 'retail') {
            inputArea.innerHTML = `<input type="number" id="edit-price" value="${item.price}" placeholder="輸入新售價">`;
            confirmBtn.onclick = () => {
                const newP = document.getElementById('edit-price').value;
                if(newP) { db.ref(`xiangyi_shop/${catId}/items/${itemId}`).update({ price: newP }); closeModal(); }
            };
        } else if (item.type === 'range') {
            inputArea.innerHTML = `
                <input type="number" id="edit-min" value="${item.min}" placeholder="最低">
                <input type="number" id="edit-max" value="${item.max}" placeholder="最高">`;
            confirmBtn.onclick = () => {
                const min = document.getElementById('edit-min').value, max = document.getElementById('edit-max').value;
                if(min && max) { db.ref(`xiangyi_shop/${catId}/items/${itemId}`).update({ min, max }); closeModal(); }
            };
        } else {
            inputArea.innerHTML = `<p style="font-size:12px; color:#ff4444">自填項目無需預設價格</p>`;
            confirmBtn.onclick = closeModal;
        }

        modal.style.display = 'block';
        overlay.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function updateItems() {
        const id = document.getElementById('pCat').value;
        const listDiv = document.getElementById('item-list');
        listDiv.innerHTML = '';
        if (id && storeData[id].items) {
            document.getElementById('calc-section').style.display = 'block';
            
            const itemsArray = [];
            for (let iId in storeData[id].items) {
                itemsArray.push({ id: iId, ...storeData[id].items[iId] });
            }
            itemsArray.sort((a, b) => (a.order || 0) - (b.order || 0));

            itemsArray.forEach(it => {
                let pt = '';
                if(it.type==='custom') pt = '自填總價';
                else if(it.type==='retail') pt = `$${it.price}/個`;
                else if(it.type==='range') pt = `$${it.min}~${it.max}`;
                else pt = `$${it.price}`;

                let extraUI = '';
                if(it.type==='custom') {
                    extraUI = `<div class="custom-price-input" id="box-${it.id}"><input type="number" oninput="recalc()" placeholder="請輸入成交總額"></div>`;
                } else if(it.type==='retail') {
                    extraUI = `
                        <div class="qty-control" id="qty-box-${it.id}">
                            <span style="font-size:12px; color:#888">購買數量：</span>
                            <button class="qty-btn" onclick="changeQty('${it.id}', -1)">-</button>
                            <span class="qty-val" id="qty-val-${it.id}">1</span>
                            <button class="qty-btn" onclick="changeQty('${it.id}', 1)">+</button>
                        </div>`;
                }

                listDiv.innerHTML += `
                    <div class="item-option">
                        <label class="item-main">
                            <input type="checkbox" name="si" value="${it.name}" data-type="${it.type}" data-id="${it.id}" data-p="${it.price||0}" onchange="toggleExtra('${it.id}', '${it.type}', this.checked)">
                            <span>${it.name}</span>
                            <span class="price-tag">${pt}</span>
                        </label>
                        ${extraUI}
                    </div>`;
            });
        }
        recalc();
    }

    function toggleExtra(id, type, checked) {
        if(type === 'custom') {
            const b = document.getElementById(`box-${id}`);
            if(b) b.style.display = checked ? 'block' : 'none';
        } else if(type === 'retail') {
            const b = document.getElementById(`qty-box-${id}`);
            if(b) b.style.display = checked ? 'flex' : 'none';
            if(!checked) document.getElementById(`qty-val-${id}`).innerText = '1';
        }
        recalc();
    }

    function changeQty(id, delta) {
        const span = document.getElementById(`qty-val-${id}`);
        let current = parseInt(span.innerText);
        current = Math.max(1, current + delta);
        span.innerText = current;
        recalc();
    }

    function recalc() {
        let fixed = 0, customOrig = 0, retailTotal = 0;
        const sel = document.querySelectorAll('input[name="si"]:checked');
        if(!sel.length) { 
            document.getElementById('total-calc-hint').style.display = 'none'; 
            document.getElementById('pPrice').value=''; 
            return; 
        }
        
        sel.forEach(el => {
            const t = el.getAttribute('data-type'), id = el.getAttribute('data-id');
            const p = parseFloat(el.getAttribute('data-p')) || 0;

            if(t === 'custom') {
                customOrig += parseFloat(document.querySelector(`#box-${id} input`).value) || 0;
            } else if(t === 'retail') {
                const qty = parseInt(document.getElementById(`qty-val-${id}`).innerText);
                retailTotal += (p * qty);
            } else if(t === 'single') {
                fixed += p;
            }
        });

        const cFinal = Math.floor(customOrig * 0.1);
        const total = fixed + retailTotal + cFinal;
        
        document.getElementById('total-calc-hint').style.display = 'block';
        document.getElementById('total-calc-hint').innerHTML = `
            ${fixed > 0 ? `服務項目：$${fixed}<br>` : ''}
            ${retailTotal > 0 ? `零售小計：$${retailTotal}<br>` : ''}
            ${cFinal > 0 ? `委託10%：$${cFinal}<br>` : ''}
            -------------------<br>
            總金額：<b>$${total}</b>`;
        document.getElementById('pPrice').value = total;
    }

    async function generateOrderNo() {
        const now = new Date();
        const dateStr = (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + now.getMinutes().toString().padStart(2, '0');
        const dayRef = db.ref('order_counters/' + dateStr);
        const snapshot = await dayRef.transaction(currentCount => {
            return (currentCount || 0) + 1;
        });
        const seq = snapshot.snapshot.val().toString().padStart(2, '0');
        return `${dateStr}${timeStr}${seq}`;
    }

    async function sendOrder() {
        if (!userData) return alert("請先登入 Discord 帳號");
        const cid = document.getElementById('pCat').value, finalP = document.getElementById('pPrice').value;
        const sel = document.querySelectorAll('input[name="si"]:checked');
        if (!cid || !sel.length) return alert("請勾選預定項目");

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "處理中...";

        try {
            const orderNo = await generateOrderNo();
            let details = [];
            sel.forEach(el => {
                const t = el.getAttribute('data-type'), id = el.getAttribute('data-id'), p = parseFloat(el.getAttribute('data-p')) || 0;
                let info = el.value;
                if(t==='custom') {
                    let v = document.querySelector(`#box-${id} input`).value || 0;
                    info += ` (原價$${v}/抽成$${Math.floor(v*0.1)})`;
                } else if(t==='retail') {
                    const qty = document.getElementById(`qty-val-${id}`).innerText;
                    info += ` x${qty} ($${p*qty})`;
                } else {
                    info += ` ($${p})`;
                }
                details.push(info);
            });

            await fetch(storeData[cid].webhook, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "翔毅車業預定系統",
                    embeds: [{
                        title: `🆕 新預定單 #${orderNo}`,
                        color: 16751104,
                        fields: [
                            { name: "👤 顧客名稱", value: `<@${userData.id}>`, inline: true },
                            { name: "🆔 Discord ID", value: `\`${userData.id}\``, inline: true },
                            { name: "💰 預定總額", value: `**$${finalP}**`, inline: true },
                            { name: "📋 預定項目明細", value: "```" + details.join("\n") + "```" },
                            { name: "⏰ 下單時間", value: new Date().toLocaleString('zh-TW'), inline: false }
                        ],
                        footer: { text: "翔毅車業 · 預訂系統" }
                    }]
                })
            });
            alert(`預定成功！\n您的訂單編號為：${orderNo}`);
            location.reload();
        } catch (e) {
            alert("送出失敗，請檢查該分類的 Webhook 網址是否正確");
            btn.disabled = false;
            btn.innerText = "送出預定";
        }
    }

    function setPriceMode(m) {
        currentMode = m;
        document.getElementById('modeSingle').classList.toggle('active', m==='single');
        document.getElementById('modeRetail').classList.toggle('active', m==='retail');
        document.getElementById('modeRange').classList.toggle('active', m==='range');
        document.getElementById('modeCustom').classList.toggle('active', m==='custom');
        
        document.getElementById('inputSingle').style.display = (m==='single' || m==='retail') ? 'block' : 'none';
        document.getElementById('inputRange').style.display = m==='range' ? 'flex' : 'none';
    }

    function showLogin() { document.getElementById('player-view').style.display='none'; document.getElementById('login-view').style.display='block'; }
    function authAdmin() {
        if (document.getElementById('aUser').value==='pomelo' && document.getElementById('aPass').value==='0326') {
            document.getElementById('login-view').style.display='none'; document.getElementById('admin-view').style.display='block';
        } else alert('密碼錯誤');
    }
    function addCat() {
        const n = document.getElementById('nCatName').value, w = document.getElementById('nCatWeb').value;
        if(n && w) {
            db.ref('xiangyi_shop').push({ name: n, webhook: w });
            document.getElementById('nCatName').value = ''; document.getElementById('nCatWeb').value = '';
        }
    }
    function addItem() {
        const id = document.getElementById('aCatSelect').value, n = document.getElementById('nItemName').value;
        if(!id || !n) return alert('請完整填寫項目資訊');
        
        let maxOrder = -1;
        if(storeData[id].items) {
            Object.values(storeData[id].items).forEach(item => {
                if(item.order > maxOrder) maxOrder = item.order;
            });
        }

        let d = { name: n, type: currentMode, order: maxOrder + 1 };
        if(currentMode==='single' || currentMode==='retail') d.price = document.getElementById('nItemPrice').value;
        else if(currentMode==='range') { d.min=document.getElementById('nPriceMin').value; d.max=document.getElementById('nPriceMax').value; }
        
        db.ref(`xiangyi_shop/${id}/items`).push(d);
        document.getElementById('nItemName').value = '';
    }
</script>
</body>
</html>
