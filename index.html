<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM 雲端預購系統 v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #5865F2; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--main); text-align: center; }
        .dc-btn { background: #5865F2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .user-box { background: #2f3136; padding: 10px; border-radius: 8px; display: none; align-items: center; gap: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .user-box img { border-radius: 50%; width: 35px; }
        label { display: block; margin-top: 10px; color: #aaa; font-size: 13px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; background: #2a2a2a; color: white; }
        .btn-send { background: #ff9900; color: black; font-weight: bold; border: none; font-size: 16px; margin-top: 15px; }
        .admin-section { display: none; border-top: 2px dashed #444; margin-top: 30px; padding-top: 20px; }
        .cat-card { background: #1a1a1a; border: 1px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 8px 12px; border-radius: 5px; margin-top: 5px; }
        .del-btn { width: auto; background: #ff4444; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛒 雲端預購系統</h2>

    <div id="player-view">
        <button id="login-btn" class="dc-btn" onclick="loginDiscord()">連結 Discord 帳號</button>
        <div id="user-display" class="user-box">
            <img id="user-avatar" src="" alt="">
            <span id="user-name"></span>
        </div>

        <label>選擇預購分類</label>
        <select id="pCat" onchange="updateItems()"><option value="">載入中...</option></select>
        
        <label>選擇商品</label>
        <select id="pItem"><option value="">請先選擇分類</option></select>
        
        <label>預付定金</label>
        <input type="number" id="pPrice" placeholder="請輸入金額">
        
        <button class="btn-send" onclick="sendOrder()">送出預購申請</button>
        <p style="font-size: 10px; color: #444; text-align: center; cursor: pointer; margin-top:40px;" onclick="showLogin()">後台管理</p>
    </div>

    <div id="login-view" style="display:none;">
        <h3>管理者驗證</h3>
        <input type="text" id="aUser" placeholder="帳號">
        <input type="password" id="aPass" placeholder="密碼">
        <button onclick="authAdmin()">登入</button>
        <button style="background:#444;" onclick="location.reload()">返回</button>
    </div>

    <div id="admin-view" class="admin-section">
        <div class="cat-card">
            <h4 style="margin:0 0 10px; color:var(--main)">Step 1. 新增分類</h4>
            <input type="text" id="nCatName" placeholder="分類名稱 (如: 改裝零件)">
            <input type="text" id="nCatWeb" placeholder="此分類專用 Webhook 網址">
            <button onclick="addCat()">建立分類</button>
        </div>

        <div class="cat-card">
            <h4 style="margin:0 0 10px; color:var(--main)">Step 2. 新增商品</h4>
            <select id="aCatSelect"></select>
            <input type="text" id="nItemName" placeholder="商品名稱">
            <input type="number" id="nItemPrice" placeholder="顯示價格">
            <button onclick="addItem()">上架商品</button>
        </div>

        <div id="admin-list"></div>
    </div>
</div>

<script>
    // --- 1. 初始化與金鑰 (已填入你的 Firebase 與 Discord 資訊) ---
    const CLIENT_ID = '1496839420521742367';
    const REDIRECT_URI = window.location.href.split('#')[0];

    const firebaseConfig = {
        apiKey: "AIzaSyAO56gUfagEELFVpvu7cxKKfmO4Q165QlE",
        authDomain: "fivem-shop-7907b.firebaseapp.com",
        databaseURL: "https://fivem-shop-7907b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fivem-shop-7907b",
        storageBucket: "fivem-shop-7907b.firebasestorage.app",
        messagingSenderId: "640041446455",
        appId: "1:640041446455:web:6914a2d1b3545a6bf5a3b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let storeData = {}, userData = null;

    // --- 2. Discord 登入邏輯 ---
    function loginDiscord() {
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    }

    window.onload = () => {
        const hash = new URLSearchParams(window.location.hash.slice(1));
        const token = hash.get('access_token');
        if (token) {
            fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } })
            .then(r => r.json()).then(res => {
                userData = res;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').style.display = 'flex';
                document.getElementById('user-name').innerText = `${res.username}`;
                document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${res.id}/${res.avatar}.png`;
                window.location.hash = "";
            });
        }
        db.ref('v2_store').on('value', s => { storeData = s.val() || {}; refreshUI(); });
    };

    // --- 3. UI 刷新 ---
    function refreshUI() {
        const pC = document.getElementById('pCat'), aC = document.getElementById('aCatSelect'), aL = document.getElementById('admin-list');
        pC.innerHTML = '<option value="">請選擇...</option>';
        aC.innerHTML = '<option value="">請選擇...</option>';
        aL.innerHTML = '<h4 style="margin-top:20px">現有清單：</h4>';

        for (let id in storeData) {
            const c = storeData[id];
            pC.innerHTML += `<option value="${id}">${c.name}</option>`;
            aC.innerHTML += `<option value="${id}">${c.name}</option>`;
            
            let items = '';
            if (c.items) {
                for (let iId in c.items) {
                    items += `<div class="item-row"><span>${c.items[iId].name} ($${c.items[iId].price})</span><button class="del-btn" onclick="delI('${id}','${iId}')">刪除</button></div>`;
                }
            }
            aL.innerHTML += `<div class="cat-card"><b>${c.name}</b> <button class="del-btn" style="background:#666" onclick="delC('${id}')">刪類別</button>${items}</div>`;
        }
    }

    function updateItems() {
        const id = document.getElementById('pCat').value;
        const pI = document.getElementById('pItem');
        pI.innerHTML = '';
        if (id && storeData[id].items) {
            for (let iId in storeData[id].items) {
                pI.innerHTML += `<option value="${storeData[id].items[iId].name}">${storeData[id].items[iId].name} ($${storeData[id].items[iId].price})</option>`;
            }
        }
    }

    // --- 4. 管理功能 ---
    function showLogin() { document.getElementById('player-view').style.display='none'; document.getElementById('login-view').style.display='block'; }
    function authAdmin() {
        if (document.getElementById('aUser').value==='pomelo' && document.getElementById('aPass').value==='0326') {
            document.getElementById('login-view').style.display='none';
            document.getElementById('admin-view').style.display='block';
        } else alert('錯誤');
    }
    function addCat() {
        const n = document.getElementById('nCatName').value, w = document.getElementById('nCatWeb').value;
        if(n && w) db.ref('v2_store').push({ name: n, webhook: w });
    }
    function addItem() {
        const id = document.getElementById('aCatSelect').value, n = document.getElementById('nItemName').value, p = document.getElementById('nItemPrice').value;
        if(id && n && p) db.ref(`v2_store/${id}/items`).push({ name: n, price: p });
    }
    function delI(cid, iid) { db.ref(`v2_store/${cid}/items/${iid}`).remove(); }
    function delC(cid) { if(confirm('刪除整類？')) db.ref(`v2_store/${cid}`).remove(); }

    // --- 5. 送出訂單 ---
    async function sendOrder() {
        if (!userData) return alert("請先連結 Discord！");
        const cid = document.getElementById('pCat').value, item = document.getElementById('pItem').value, price = document.getElementById('pPrice').value;
        if (!cid || !item || !price) return alert("資訊不完整");

        await fetch(storeData[cid].webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: "車行預購系統",
                embeds: [{
                    title: `🆕 收到來自 ${userData.username} 的預購`,
                    color: 5814783,
                    fields: [
                        { name: "👤 玩家", value: `<@${userData.id}>`, inline: true },
                        { name: "📦 項目", value: item, inline: true },
                        { name: "💰 支付", value: "$" + price, inline: true }
                    ],
                    thumbnail: { url: `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png` },
                    timestamp: new Date()
                }]
            })
        });
        alert("送出成功！");
    }
</script>
</body>
</html>
